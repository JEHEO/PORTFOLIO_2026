name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 패키지 설치
        run: npm ci

      - name: 린트 검사
        run: npm run lint

      - name: 타입 체크
        run: npx tsc --noEmit

      - name: 빌드 검사
        run: npm run build

      - name: 테스트 실행
        run: npm test --if-present
